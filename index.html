<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>阮一峰周刊 · Issue 浏览器</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📰</text></svg>">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-inner">
            <div class="header-top">
                <h1 class="logo">
                    <span class="logo-icon">📰</span>
                    <span>阮一峰周刊 · Issue 浏览器</span>
                </h1>
                <a href="https://github.com/ruanyf/weekly" target="_blank" class="github-link" title="GitHub Repo">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/>
                    </svg>
                </a>
            </div>
            <div class="search-bar">
                <div class="search-wrapper">
                    <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
                    </svg>
                    <input type="text" id="searchInput" placeholder="搜索 Issue 标题或内容..." autocomplete="off">
                    <kbd class="search-kbd">/</kbd>
                </div>
            </div>
            <div class="stats-bar" id="statsBar">
                <div class="stat-item">
                    <span class="stat-number" id="statTotal">-</span>
                    <span class="stat-label">总数</span>
                </div>
                <div class="stat-item">
                    <span class="stat-number" id="statMonth">-</span>
                    <span class="stat-label">本月</span>
                </div>
                <div class="stat-item">
                    <span class="stat-number" id="statWeek">-</span>
                    <span class="stat-label">本周</span>
                </div>
                <div class="stat-item featured">
                    <span class="stat-number" id="statFeatured">-</span>
                    <span class="stat-label">⭐ 已收录</span>
                </div>
            </div>
        </div>
    </header>

    <!-- Filters -->
    <nav class="filters">
        <div class="filters-inner">
            <div class="category-tabs" id="categoryTabs">
                <button class="cat-btn active" data-category="all">
                    <span class="cat-icon">📋</span>
                    <span class="cat-name">全部</span>
                    <span class="cat-count" id="countAll">-</span>
                </button>
            </div>
            <div class="time-filter">
                <select id="monthFilter">
                    <option value="all">全部时间</option>
                </select>
                <div class="sort-toggle">
                    <button class="sort-btn active" data-sort="newest" title="最新">↓ 最新</button>
                    <button class="sort-btn" data-sort="popular" title="最热">🔥 最热</button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Subcategory bar (hidden until a category is selected) -->
    <nav class="subfilters" id="subfilters" style="display:none">
        <div class="subfilters-inner">
            <div class="subcat-tabs" id="subcatTabs">
                <!-- Dynamically populated -->
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main">
        <div class="issue-list" id="issueList">
            <!-- Issues rendered here -->
        </div>
        <div class="loading" id="loading">
            <div class="loading-spinner"></div>
            <p>加载中...</p>
        </div>
        <div class="empty-state" id="emptyState" style="display:none">
            <div class="empty-icon">🔍</div>
            <p>没有找到匹配的 Issue</p>
            <button class="reset-btn" id="resetFilters">重置筛选条件</button>
        </div>
    </main>

    <!-- Back to top -->
    <button class="back-to-top" id="backToTop" title="回到顶部">↑</button>

    <!-- Footer -->
    <footer class="footer">
        <p>
            数据来自 <a href="https://github.com/ruanyf/weekly/issues" target="_blank">ruanyf/weekly</a> · 
            最后更新: <span id="lastUpdated">-</span> · 
            <a href="https://github.com/ruanyf/weekly" target="_blank">⭐ Star on GitHub</a>
        </p>
    </footer>

    <script src="js/app.js"></script>
</body>
</html>
